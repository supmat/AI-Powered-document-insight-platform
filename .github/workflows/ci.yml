name: CI / Source Delivery Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    # Trigger on any code push to the PR
    types: [opened, synchronize, reopened]
  pull_request_review:
    # Trigger ONLY when a teammate submits a review (Approval)
    types: [submitted]

jobs:
  # ---------------------------------------------------------
  # FAST CHECKS (Runs on every single push to a PR)
  # ---------------------------------------------------------
  lint-and-typecheck:
    name: Fast Checks (Pre-commit)
    # Target only Pull Request code updates or direct pushes to master
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}

      - name: Install Project Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run Pre-Commit Hooks
        uses: pre-commit/action@v3.0.1

  # ---------------------------------------------------------
  # HEAVY CHECKS (Runs ONLY when a PR is Approved )
  # ---------------------------------------------------------
  source-delivery-check:
    name: Unit Tests & Security Scan
    # Target Pull Requests before they are merged, OR direct pushes to master
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install bandit

      - name: Run Bandit Security Scan
        run: .venv/bin/bandit -r . -ll -ii --exclude ./.venv

      - name: Run Pytest
        run: .venv/bin/pytest
