apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: document-insight
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          # Replace with your actual image from registry
          image: gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-svc
  namespace: document-insight
spec:
  type: LoadBalancer # Use NodePort if on a local cluster like Minikube
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: document-insight
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          # Replace with your actual image from registry
          image: worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: document-insight
spec:
  template:
    spec:
      containers:
        - name: mc
          image: minio/mc
          command: ["/bin/sh", "-c"]
          args:
            - >
              mc alias set myminio http://minio-svc:9000 admin minioadmin123;
              mc mb myminio/documents || true;
              mc anonymous set public myminio/documents || true;
          env:
            - name: MC_HOST_myminio
              value: "http://admin:minioadmin123@minio-svc:9000"
      restartPolicy: OnFailure
