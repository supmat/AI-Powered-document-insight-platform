apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: document-insight
type: Opaque
stringData:
  # NOTE: In a real production environment, use a Secret Manager or SealedSecrets.
  # These are placeholders. You must update these with your actual values.
  postgres-password: "password"
  rabbitmq-password: "password"
  minio-root-password: "minioadmin123"
  secret-key: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  gemini-api-key: "" # Optional
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: document-insight
data:
  POSTGRES_USER: "admin"
  POSTGRES_DB: "document_insights"
  POSTGRES_SERVER: "postgres-svc"
  MINIO_URL: "minio-svc:9000"
  MINIO_ROOT_USER: "minioadmin"
  MINIO_BUCKET_NAME: "documents"
  MINIO_SECURE: "false"
  RABBITMQ_USER: "admin"
  RABBITMQ_QUEUE_NAME: "document_processing_queue"
  RABBITMQ_URL: "amqp://admin:password@rabbitmq-svc:5672/"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
